name: RP-01C deterministic fixtures

on:
  workflow_dispatch:
    inputs:
      base_sha:
        description: Explicit base SHA for package gate
        required: true
      head_sha:
        description: Explicit head SHA for package gate
        required: true
  push:
    paths: &rp02b2a_paths
      - '.github/workflows/rp01a-e2e.yml'
      - '.github/workflows/rp01b-dom.yml'
      - '.github/workflows/rp01c-fixtures.yml'
      - '.github/workflows/remediation-governance.yml'
      - '.github/workflows/rp02b2a-admission.yml'
      - 'apps/admin-web/src/modules/novels/components/TaskProgressPanel.dom.spec.ts'
      - 'apps/api/test/rp01c/**'
      - 'apps/api/test/rp02a/**'
      - 'apps/api/test/rp02b/**'
      - 'apps/api/test/rp02b2a/**'
      - 'apps/api/src/**'
      - 'apps/api/prisma/**'
      - 'apps/api/package.json'
      - 'apps/api/tsconfig.json'
      - 'packages/shared/src/**'
      - 'packages/shared/package.json'
      - 'packages/shared/tsconfig.json'
      - 'scripts/e2e/**'
      - 'scripts/remediation-governance.*'
      - 'scripts/rp02b2a-package-gate.*'
      - 'docs/modules/rp-02b2-dispatcher-transport-implementation-package.md'
      - 'docs/remediation/acceptance-matrix.md'
      - 'docs/reviews/main-control-event-ledger.md'
      - 'docs/reviews/main-control-status.md'
      - 'docs/reviews/remediation-rmd-task-002-003-rp-02b2a1-verification-2026-07-15.md'
      - 'docs/adr/rp-02b2a1-registry-abi-budget.md'
      - 'docs/adr/rp-02b2a2-gate-prep-budget.md'
      - 'docs/adr/rp-02b2a2-g0-ci-compat-correction-budget.md'
      - 'docs/adr/rp-02b2a2-authority-claim-budget.md'
      - 'docs/adr/rp-02b2a3-lease-retry-budget.md'
      - 'docs/adr/rp-02b2a4-inmemory-finalize-budget.md'
      - 'docs/adr/rp-02b2a5-prisma-nine-six-budget.md'
      - 'docs/reviews/rp-02b2a2-g0-ci-compat-correction-verification-2026-07-18.md'
      - 'package.json'
      - 'package-lock.json'
permissions:
  actions: read
  contents: read

jobs:
  rp01c-fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AI_PROVIDER_MODE: mock
      E2E_PROFILE: rp01a-local-inmemory
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.head_sha || github.event.after }}
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.14.0
          cache: npm
      - name: Resolve B2a package gate range
        id: b2a-range
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_CREATED: ${{ github.event.created }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.event.after }}
          MANUAL_BASE_SHA: ${{ inputs.base_sha }}
          MANUAL_HEAD_SHA: ${{ inputs.head_sha }}
          B2A_AUTHORIZED_PACKAGE_ID: ${{ vars.RP02B2A_AUTHORIZED_PACKAGE_ID }}
          B2A_AUTHORIZED_PREDECESSOR_SHA: ${{ vars.RP02B2A_AUTHORIZED_PREDECESSOR_SHA }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "push" ]]; then
            env -u DATABASE_URL -u DEEPSEEK_API_KEY -u DEEPSEEK_BASE_URL -u DEEPSEEK_MODEL -u DEEPSEEK_STRUCTURE_MODEL -u DEEPSEEK_REASONER_MODEL -u DEEPSEEK_TIMEOUT_MS -u DEEPSEEK_MAX_RETRIES -u DEPLOYMENT_ACTOR_TENANT_ID -u DEPLOYMENT_ACTOR_USER_ID NODE_ENV=production AI_PROVIDER_MODE=mock DOTENV_CONFIG_PATH=/dev/null node scripts/rp02b2a-package-gate.mjs --print-range --event push --push-created "$PUSH_CREATED" --push-before "$PUSH_BEFORE_SHA" --push-head "$PUSH_AFTER_SHA" --authorized-package-id "$B2A_AUTHORIZED_PACKAGE_ID" --authorized-predecessor-sha "$B2A_AUTHORIZED_PREDECESSOR_SHA" >> "$GITHUB_OUTPUT"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            env -u DATABASE_URL -u DEEPSEEK_API_KEY -u DEEPSEEK_BASE_URL -u DEEPSEEK_MODEL -u DEEPSEEK_STRUCTURE_MODEL -u DEEPSEEK_REASONER_MODEL -u DEEPSEEK_TIMEOUT_MS -u DEEPSEEK_MAX_RETRIES -u DEPLOYMENT_ACTOR_TENANT_ID -u DEPLOYMENT_ACTOR_USER_ID NODE_ENV=production AI_PROVIDER_MODE=mock DOTENV_CONFIG_PATH=/dev/null node scripts/rp02b2a-package-gate.mjs --print-range --event workflow_dispatch --manual-base "$MANUAL_BASE_SHA" --manual-head "$MANUAL_HEAD_SHA" --authorized-package-id "$B2A_AUTHORIZED_PACKAGE_ID" --authorized-predecessor-sha "$B2A_AUTHORIZED_PREDECESSOR_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "RP-01C only accepts trusted push or explicit workflow_dispatch ranges" >&2
            exit 1
          fi
          BASE="$(grep '^base=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2-)"
          HEAD="$(grep '^head=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2-)"
          if [[ -z "$BASE" || -z "$HEAD" || "$BASE" =~ ^0+$ || "$HEAD" =~ ^0+$ ]]; then
            echo "B2a package gate requires explicit non-zero BASE/HEAD" >&2
            exit 1
          fi
          test "$(git rev-parse HEAD)" = "$(git rev-parse "$HEAD")"
      - name: Resolve B2a package command
        id: b2a-package
        env:
          B2A_BASE_SHA: ${{ steps.b2a-range.outputs.base }}
          B2A_HEAD_SHA: ${{ steps.b2a-range.outputs.head }}
          B2A_GATE_SOURCE_SHA: ${{ vars.RP02B2A_GATE_SOURCE_SHA }}
          B2A_G0_EVIDENCE_SHA: ${{ vars.RP02B2A_G0_EVIDENCE_SHA }}
          B2A_AUTHORIZED_PACKAGE_ID: ${{ vars.RP02B2A_AUTHORIZED_PACKAGE_ID }}
          B2A_AUTHORIZED_PREDECESSOR_SHA: ${{ vars.RP02B2A_AUTHORIZED_PREDECESSOR_SHA }}
        run: |
          set -euo pipefail
          env -u DATABASE_URL -u DEEPSEEK_API_KEY -u DEEPSEEK_BASE_URL -u DEEPSEEK_MODEL -u DEEPSEEK_STRUCTURE_MODEL -u DEEPSEEK_REASONER_MODEL -u DEEPSEEK_TIMEOUT_MS -u DEEPSEEK_MAX_RETRIES -u DEPLOYMENT_ACTOR_TENANT_ID -u DEPLOYMENT_ACTOR_USER_ID NODE_ENV=production AI_PROVIDER_MODE=mock DOTENV_CONFIG_PATH=/dev/null node scripts/rp02b2a-package-gate.mjs --github-output --base "$B2A_BASE_SHA" --head "$B2A_HEAD_SHA" --gate-source "$B2A_GATE_SOURCE_SHA" --g0-evidence-sha "$B2A_G0_EVIDENCE_SHA" --authorized-package-id "$B2A_AUTHORIZED_PACKAGE_ID" --authorized-predecessor-sha "$B2A_AUTHORIZED_PREDECESSOR_SHA" >> "$GITHUB_OUTPUT"
      - name: Verify B2a workflow contract
        env:
          B2A_PACKAGE_ID: ${{ steps.b2a-package.outputs.package_id }}
          B2A_TEST_COMMAND: ${{ steps.b2a-package.outputs.test_command }}
        run: |
          set -euo pipefail
          env -u DATABASE_URL -u DEEPSEEK_API_KEY -u DEEPSEEK_BASE_URL -u DEEPSEEK_MODEL -u DEEPSEEK_STRUCTURE_MODEL -u DEEPSEEK_REASONER_MODEL -u DEEPSEEK_TIMEOUT_MS -u DEEPSEEK_MAX_RETRIES -u DEPLOYMENT_ACTOR_TENANT_ID -u DEPLOYMENT_ACTOR_USER_ID NODE_ENV=production AI_PROVIDER_MODE=mock DOTENV_CONFIG_PATH=/dev/null node scripts/rp02b2a-package-gate.mjs --verify-workflow .github/workflows/rp01c-fixtures.yml --package-id "$B2A_PACKAGE_ID" --test-command "$B2A_TEST_COMMAND"
      - name: Verify G0 evidence parent runs
        if: steps.b2a-package.outputs.package_id == 'RP-02B2a2-G0-E1'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          B2A_BASE_SHA: ${{ steps.b2a-range.outputs.base }}
          B2A_HEAD_SHA: ${{ steps.b2a-range.outputs.head }}
          EVIDENCE_PARENT: ${{ steps.b2a-package.outputs.evidence_parent }}
          EVIDENCE_RUNS: ${{ steps.b2a-package.outputs.evidence_runs }}
        run: |
          set -euo pipefail
          test "$B2A_BASE_SHA" = "$EVIDENCE_PARENT"
          IFS=',' read -r -a RUNS <<< "$EVIDENCE_RUNS"
          test "${#RUNS[@]}" -eq 4
          declare -A SEEN_LABELS=() SEEN_RUN_IDS=()
          for item in "${RUNS[@]}"; do
            label="${item%%:*}"
            run_id="${item#*:}"
            case "$label" in
              rp01a) expected="RP-01A backend E2E"; workflow_file="rp01a-e2e.yml"; expected_path=".github/workflows/$workflow_file" ;;
              rp01b) expected="RP-01B admin DOM tests"; workflow_file="rp01b-dom.yml"; expected_path=".github/workflows/$workflow_file" ;;
              rp01c) expected="RP-01C deterministic fixtures"; workflow_file="rp01c-fixtures.yml"; expected_path=".github/workflows/$workflow_file" ;;
              governance) expected="Remediation governance"; workflow_file="remediation-governance.yml"; expected_path=".github/workflows/$workflow_file" ;;
              *) exit 1 ;;
            esac
            [[ "$run_id" =~ ^[1-9][0-9]+$ ]] || { echo "parent run id is invalid" >&2; exit 1; }
            test -z "${SEEN_LABELS[$label]+x}" || { echo "duplicate workflow label" >&2; exit 1; }
            test -z "${SEEN_RUN_IDS[$run_id]+x}" || { echo "duplicate workflow run id" >&2; exit 1; }
            SEEN_LABELS[$label]=1
            SEEN_RUN_IDS[$run_id]=1
            IFS=$'\t' read -r expected_workflow_id repository_path < <(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/$workflow_file" --jq '[.id,.path] | @tsv')
            [[ "$expected_workflow_id" =~ ^[1-9][0-9]+$ ]] || { echo "workflow id lookup is invalid" >&2; exit 1; }
            test "$repository_path" = "$expected_path" || { echo "workflow repository path mismatch" >&2; exit 1; }
            IFS=$'\t' read -r name workflow_path workflow_id event run_head status conclusion < <(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id" --jq '[.name,.path,.workflow_id,.event,.head_sha,.status,.conclusion] | @tsv')
            test "$name" = "$expected" || { echo "workflow name mismatch" >&2; exit 1; }
            case "$workflow_path" in
              "$expected_path") ;;
              "$expected_path"@*) workflow_ref="${workflow_path#"$expected_path"@}"; [[ "$workflow_ref" =~ ^[A-Za-z0-9][A-Za-z0-9._/@+-]{0,254}$ ]] || exit 1 ;;
              *) echo "workflow path mismatch" >&2; exit 1 ;;
            esac
            test "$workflow_id" = "$expected_workflow_id" || { echo "workflow id mismatch" >&2; exit 1; }
            test "$event" = "push" || { echo "workflow event mismatch" >&2; exit 1; }
            test "$run_head" = "$EVIDENCE_PARENT" || { echo "workflow head mismatch" >&2; exit 1; }
            test "$status" = "completed" || { echo "workflow status mismatch" >&2; exit 1; }
            test "$conclusion" = "success" || { echo "workflow conclusion mismatch" >&2; exit 1; }
            git cat-file -e "${EVIDENCE_PARENT}:${expected_path}"
            git cat-file -e "${B2A_HEAD_SHA}:${expected_path}"
            git diff --quiet "$EVIDENCE_PARENT" "$B2A_HEAD_SHA" -- "$expected_path"
          done
      - run: npm ci
      - run: ./node_modules/.bin/playwright install chromium
      - run: npm run test:rp01c
      - run: npm run test:rp02a
      - env:
          B2A_TEST_COMMAND: ${{ steps.b2a-package.outputs.test_command }}
        run: |
          set -euo pipefail
          env -u DATABASE_URL -u DEEPSEEK_API_KEY -u DEEPSEEK_BASE_URL -u DEEPSEEK_MODEL -u DEEPSEEK_STRUCTURE_MODEL -u DEEPSEEK_REASONER_MODEL -u DEEPSEEK_TIMEOUT_MS -u DEEPSEEK_MAX_RETRIES -u DEPLOYMENT_ACTOR_TENANT_ID -u DEPLOYMENT_ACTOR_USER_ID NODE_ENV=production AI_PROVIDER_MODE=mock DOTENV_CONFIG_PATH=/dev/null npm run "$B2A_TEST_COMMAND"
      - run: npm test -w @ai-shortvideo/api
      - run: npm run test:e2e:rp01a
      - run: npm run test:governance
      - run: npm run typecheck
      - run: npm run build -w @ai-shortvideo/api
      - run: npm run prisma:validate -w @ai-shortvideo/api
      - run: git diff --check
      - run: npm run governance:git-budget
